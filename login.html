<!DOCTYPE html>
<html>
<head>
<title>Blufin Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#ff0066,#111);
}

.login{
    background:white;
    width:300px;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px #0005;
    animation:show 1s;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

input{
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:20px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff0066;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="login">
    <h1>BLUFIN MEN'S WEAR</h1>
    <h2>Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>New user? <a href="#">Create Account</a></p>
</div>

<script>
function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user && pass){
        window.location.href = "home.html";
    } else {
        alert("Please fill all fields");
    }
}
</script>

</body>
</html>
